  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.forEach(c=>{\n      const start = c.nextDt, end = this.addDays(start,1);\n      L.push('BEGIN:VEVENT');\n      L.push('UID:pfc-'+c.id+'@primefleetcare');\n      L.push('DTSTAMP:'+dstr(this.TODAY)+'T090000Z');\n      L.push('DTSTART;VALUE=DATE:'+dstr(start));\n      L.push('DTEND;VALUE=DATE:'+dstr(end));\n      L.push('RRULE:FREQ=DAILY;INTERVAL='+c.freq);\n      L.push('SUMMARY:Truck wash \\u2014 '+esc(c.business)+' ('+c.trucks+')');\n      L.push('DESCRIPTION:'+esc(c.freqLabel+' fleet wash. '+c.trucks+' trucks. Contact: '+c.contact+' '+c.phone));\n      L.push('BEGIN:VALARM');\n      L.push('TRIGGER:-P'+lead+'D');\n      L.push('ACTION:DISPLAY');\n      L.push('DESCRIPTION:Wash due in '+lead+' days \\u2014 '+esc(c.business));\n      L.push('END:VALARM');\n      L.push('END:VEVENT');\n    });\n    L.push('END:VCALENDAR');\n    try{\n      const blob = new Blob([L.join('\\r\\n')], {type:'text/calendar'});\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = 'primefleet-washes.ics';\n      document.body.appendChild(a); a.click();\n      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 120);\n      this.flash('Calendar file downloaded \\u2014 in Google Calendar, open Settings \\u2192 Import & export to add every wash.');\n    }catch(e){ this.flash('Could not create the calendar file.'); }\n  }\n\n  markDone(id){\n    const today = this.iso(this.TODAY);\n    const c = this.state.custData.find(x=>x.id===id);\n    const data = this.state.custData.map(x=> x.id===id ? Object.assign({},x,{lastWash:today,history:x.history.concat([today])}) : x);\n    this.persist(data);\n    this.setState({custData:data});\n    this.flash('Wash logged for '+c.business+' — thank-you sent ('+this.chLabel()+') and next wash scheduled.');\n  }\n\n  saveCustomer(){\n    const f = this.state.form;\n    if(!f.business || !f.business.trim()){ this.setState({formErr:true}); return; }\n    const today = this.iso(this.TODAY);\n    const lw = f.lastWash || today;\n    const fields = {\n      business:f.business.trim(), contact:f.contact||'—', phone:f.phone||'—', email:f.email||'—',\n      address:f.address||'—', trucks:Number(f.trucks)||1, freq:Number(f.freq)||14, notes:f.notes||'No notes yet.', lastWash:lw\n    };\n    if(this.state.editId){\n      const data = this.state.custData.map(c=>{\n        if(c.id!==this.state.editId) return c;\n        let hist = c.history.slice();\n        if(hist.length) hist[hist.length-1] = lw; else hist = [lw];\n        return Object.assign({}, c, fields, {history:hist});\n      });\n      this.persist(data);\n      this.setState({custData:data, drawer:'detail', editId:null, formErr:false});\n      this.flash(fields.business+' updated.');\n    } else {\n      const nc = Object.assign({id:'c'+Date.now()}, fields, {history:[lw]});\n      const data = this.state.custData.concat([nc]);\n      this.persist(data);\n      this.setState({custData:data, drawer:null, formErr:false});\n      this.flash(nc.business+' added — next wash scheduled, reminders are now active.');\n    }\n  }\n\n  renderVals(){\n    const data = this.state.custData;\n    const list = data.map(c=>this.computed(c));\n    const byName = list.slice().sort((a,b)=>a.business.localeCompare(b.business));\n    const lead = this.lead();\n    const dueWeek = list.filter(c=>c.du>=0 && c.du<=lead).length;\n    const overdue = list.filter(c=>c.du<0).length;\n    const trucks = list.reduce((s,c)=>s+c.trucks,0);\n\n    const mk = (v,icon,label,badge)=>({\n      onClick:()=>this.setView(v), icon, label, badge:badge||'',\n      style:this.navStyle(this.state.view===v),\n      badgeStyle: badge ? (\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;background:\"+(this.state.view===v?'rgba(0,0,0,0.16)':'#2c2c2c')+';color:'+(this.state.view===v?'#161616':'#FF6A00')+';') : 'display:none;'\n    });\n    const navItems = [ mk('calendar','▦','Calendar',''), mk('customers','▤','Customers',String(list.length)), mk('reminders','◷','Reminders',String(dueWeek)) ];\n\n    const calendar = this.buildCalendar(list);\n    const weekdays = this.weekdays();\n    const dueList = list.filter(c=>c.du<=lead).sort((a,b)=>a.du-b.du).map(c=>this.dueItem(c));\n\n    const q = (this.state.custQuery||'').toLowerCase();\n    const custRows = byName.filter(c=> !q || c.business.toLowerCase().indexOf(q)>=0 || c.contact.toLowerCase().indexOf(q)>=0).map(c=>this.row(c));\n    const feed = this.buildFeed(list);\n\n    const monthName = this.MOL[this.parse(this.state.monthAnchor).getMonth()];\n    const heads = {\n      calendar:['Wash calendar', monthName+' schedule · '+dueWeek+' due this week · '+overdue+' overdue'],\n      customers:['Customers', list.length+' active accounts · '+trucks+' trucks across the books'],\n      reminders:['Reminders & automation', 'Auto reminder '+lead+' days out · thank-you on completion · '+this.chLabel()]\n    };\n    const head = heads[this.state.view];\n\n    const drawer = this.state.drawer;\n    const selRaw = this.state.selectedId ? data.find(c=>c.id===this.state.selectedId) : null;\n    let sel = null;\n    if(selRaw){\n      const s = this.computed(selRaw);\n      sel = Object.assign({}, s, {\n        statusStyle:this.pill(s.status), statusLabel:s.dueLabel,\n        onDone:()=>this.markDone(s.id), onEdit:()=>this.openEdit(),\n        remindLine:'Reminder to you & team '+lead+' days before — next on '+this.fmtShort(this.addDays(s.nextDt,-lead))+'.',\n        notifLine:'Thank-you ('+this.chLabel()+') sends automatically the moment you log this wash.',\n        history: s.history.slice().reverse().map(h=>({label:this.fmtLong(this.parse(h)), rel:this.rel(this.parse(h))}))\n      });\n    }\n\n    const reminderCopy = 'Heads up — a fleet wash is due in '+lead+' days. Confirm the booking and it drops straight onto the Google Calendar.';\n    const thankCopy = 'Thanks for choosing PrimeFleet Care — your fleet is looking sharp! We\\u2019ve booked your next wash. See you then.';\n\n    return {\n      isCalendar:this.state.view==='calendar', isCustomers:this.state.view==='customers', isReminders:this.state.view==='reminders',\n      navItems, calendar, weekdays, dueList, custRows, feed,\n      custEmpty:custRows.length===0, dueEmpty:dueList.length===0, feedEmpty:feed.length===0,\n      counts:{ dueWeek, overdueLabel: overdue ? (overdue+' overdue — chase up') : 'All fleets on track', overdueStyle: overdue ? 'color:#ff8a5c;' : 'color:#7fd19a;', total:list.length, trucks },\n      headerTitle:head[0], headerSub:head[1],\n      openAdd:()=>this.openAdd(), closeDrawer:()=>this.closeDrawer(),\n      onExport:()=>this.exportData(), onImport:e=>this.importData(e), onExportICS:()=>this.exportICS(),\n      prevMonth:()=>this.shiftMonth(-1), nextMonth:()=>this.shiftMonth(1), goToday:()=>this.goToday(),\n      onSearch:e=>this.onSearch(e), custQuery:this.state.custQuery,\n      drawerOpen:!!drawer, isDetail:drawer==='detail', isForm:(drawer==='add'||drawer==='edit'),\n      formTitle:(drawer==='edit'?'Edit customer':'New customer'), saveLabel:(drawer==='edit'?'Save changes':'Add customer'), sel,\n      form:this.state.form, onFormChange:e=>this.onFormChange(e), onSave:()=>this.saveCustomer(), formErr:this.state.formErr,\n      lead, channelLabel:this.chLabel(), reminderCopy, thankCopy,\n      toast:this.state.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
